<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BotAr - Gestioná tus bots de WhatsApp</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        blue: { 50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81' },
        green: { 50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac', 400: '#4ade80', 500: '#22c55e', 600: '#16a34a', 700: '#15803d', 800: '#166534', 900: '#14532d' },
      }
    }
  }
}
</script>
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100 min-h-screen">

<div id="app" class="hidden">
  <div class="flex h-screen">
    <!-- Sidebar -->
    <aside class="w-64 bg-gradient-to-b from-blue-800 to-blue-900 text-white flex flex-col shadow-xl">
      <div class="p-5 border-b border-white/10">
        <div class="flex items-center gap-2.5">
          <img src="/logo.svg" alt="BotAr" class="w-8 h-8">
          <div class="flex-1">
            <h1 class="text-lg font-bold tracking-tight leading-none">BotAr</h1>
            <button onclick="togglePlatforms()" class="flex items-center gap-1 text-[10px] text-white/40 font-medium uppercase tracking-widest mt-0.5 hover:text-white/60 transition-colors">
              Plataformas
              <svg id="chevron" class="w-3 h-3 transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            </button>
          </div>
        </div>
        <p class="text-xs text-white/50 mt-3 truncate" id="sidebarUser"></p>
      </div>
      <div id="platformsDropdown" class="hidden border-b border-white/10 px-3 py-2 space-y-1">
        <button onclick="showView('clients')" class="platform-btn w-full text-left px-3 py-2 rounded-xl bg-white/10 text-white flex items-center gap-2.5 text-sm font-medium transition-all duration-200">
          <span class="text-base">💬</span> WhatsApp Bot
        </button>
        <button disabled class="w-full text-left px-3 py-2 rounded-xl text-white/30 flex items-center gap-2.5 text-sm font-medium cursor-not-allowed">
          <span class="text-base opacity-50">📸</span> Instagram Bot
          <span class="ml-auto text-[9px] bg-white/10 px-1.5 py-0.5 rounded">Pronto</span>
        </button>
        <button disabled class="w-full text-left px-3 py-2 rounded-xl text-white/30 flex items-center gap-2.5 text-sm font-medium cursor-not-allowed">
          <span class="text-base opacity-50">🎵</span> TikTok Bot
          <span class="ml-auto text-[9px] bg-white/10 px-1.5 py-0.5 rounded">Pronto</span>
        </button>
        <button disabled class="w-full text-left px-3 py-2 rounded-xl text-white/30 flex items-center gap-2.5 text-sm font-medium cursor-not-allowed">
          <span class="text-base opacity-50">👍</span> Facebook Bot
          <span class="ml-auto text-[9px] bg-white/10 px-1.5 py-0.5 rounded">Pronto</span>
        </button>
      </div>
      <nav class="flex-1 p-3 space-y-1">
        <button onclick="showView('clients')" class="nav-btn w-full text-left px-3 py-2.5 rounded-xl hover:bg-white/10 transition-all duration-200 flex items-center gap-3 text-sm font-medium">
          <span class="text-lg">📱</span> Mis Bots
        </button>
        <div id="adminNav" class="hidden space-y-1 pt-2 border-t border-white/10">
          <button onclick="showView('users')" class="nav-btn w-full text-left px-3 py-2.5 rounded-xl hover:bg-white/10 transition-all duration-200 flex items-center gap-3 text-sm font-medium">
            <span class="text-lg">👥</span> Usuarios
          </button>
          <button onclick="showView('settings')" class="nav-btn w-full text-left px-3 py-2.5 rounded-xl hover:bg-white/10 transition-all duration-200 flex items-center gap-3 text-sm font-medium">
            <span class="text-lg">⚙️</span> Configuración
          </button>
        </div>
        <button onclick="showView('plans')" class="nav-btn w-full text-left px-3 py-2.5 rounded-xl hover:bg-white/10 transition-all duration-200 flex items-center gap-3 text-sm font-medium">
          <span class="text-lg">💎</span> Planes
        </button>
      </nav>
      <div class="p-4 border-t border-white/10 text-sm">
        <p class="text-white/50" id="planLabel"></p>
        <button onclick="logout()" class="text-red-300 hover:text-red-200 mt-1.5 text-sm font-medium transition-colors">Cerrar sesión</button>
      </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 flex flex-col overflow-hidden bg-gray-50">

      <!-- Clients View -->
      <div id="view-clients" class="flex-1 flex flex-col min-h-0">
        <div class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between shadow-sm">
          <h2 class="text-lg font-semibold text-gray-800">Mis Bots</h2>
          <button onclick="showAddClient()" class="bg-blue-600 text-white px-4 py-2 rounded-xl hover:bg-blue-700 text-sm font-medium transition-all shadow-sm hover:shadow-md flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            Nuevo Bot
          </button>
        </div>
        <div class="flex-1 flex overflow-hidden min-h-0">
          <div class="w-80 border-r border-gray-200 bg-white overflow-y-auto min-h-0">
            <div id="clientList" class="p-3 space-y-1"></div>
          </div>
          <div id="clientDetail" class="flex-1 p-6 overflow-y-auto min-h-0">
            <div class="flex flex-col items-center justify-center h-full text-gray-400">
              <div class="text-6xl mb-4 opacity-50">🤖</div>
              <p class="text-lg font-medium">Seleccioná un bot de la lista</p>
              <p class="text-sm">Hacé clic en un bot para ver sus detalles</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Users View (admin only) -->
      <div id="view-users" class="flex-1 overflow-y-auto hidden p-6">
        <h2 class="text-xl font-semibold text-gray-800 mb-5">Usuarios</h2>
        <div id="usersList" class="space-y-3 max-w-3xl"></div>
      </div>

      <!-- Settings View (admin only) -->
      <div id="view-settings" class="flex-1 overflow-y-auto hidden p-6">
        <h2 class="text-xl font-semibold text-gray-800 mb-5">Configuración Global</h2>
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 max-w-2xl space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">Prefijo de comandos</label>
            <input id="set-prefix" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" value="!">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">Cooldown (segundos)</label>
            <input id="set-cooldown" type="number" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" value="172800">
          </div>
          <hr class="my-4">
          <h4 class="font-semibold text-gray-700">💳 PayPal</h4>
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">Client ID</label>
            <input id="set-paypal-client-id" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 font-mono text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="AeB...">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">Client Secret</label>
            <input id="set-paypal-secret" type="password" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 font-mono text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="E...">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">Modo</label>
            <select id="set-paypal-mode" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
              <option value="sandbox">Sandbox (pruebas)</option>
              <option value="live">Live (producción)</option>
            </select>
          </div>
          <button onclick="saveGlobalSettings()" class="bg-blue-600 text-white px-6 py-2.5 rounded-xl hover:bg-blue-700 text-sm font-medium transition-all shadow-sm hover:shadow-md">
            Guardar
          </button>
        </div>
      </div>

      <!-- Plans View -->
      <div id="view-plans" class="flex-1 overflow-y-auto hidden p-6">
        <h2 class="text-xl font-semibold text-gray-800 mb-5">Planes</h2>
        <div id="plansList" class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-5xl"></div>
      </div>
    </main>
  </div>
</div>

<!-- Auth views -->
<div id="auth-container" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-blue-100 p-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <img src="/logo.svg" alt="BotAr" class="w-16 h-16 mx-auto mb-4">
      <h1 class="text-3xl font-bold text-blue-900 tracking-tight">BotAr</h1>
      <p class="text-blue-600/60 mt-1 text-sm font-medium">Gestión de bots WhatsApp</p>
    </div>
    <div class="bg-white rounded-2xl shadow-xl border border-blue-100 p-8">
      <div id="login-form">
        <div class="space-y-4">
          <input id="login-email" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="Email" type="email">
          <input id="login-pass" type="password" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="Contraseña">
          <button onclick="login()" class="w-full bg-blue-600 text-white py-3 rounded-xl hover:bg-blue-700 text-sm font-medium transition-all shadow-sm hover:shadow-md">Ingresar</button>
          <p class="text-center text-sm text-gray-500">
            ¿No tenés cuenta?
            <a href="#" onclick="showRegister()" class="text-blue-600 hover:text-blue-700 font-medium">Registrate</a>
          </p>
          <p id="login-error" class="text-red-500 text-sm text-center hidden"></p>
        </div>
      </div>
      <div id="register-form" class="hidden">
        <div class="space-y-4">
          <input id="reg-name" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="Nombre">
          <input id="reg-email" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="Email" type="email">
          <input id="reg-pass" type="password" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="Contraseña">
          <button onclick="register()" class="w-full bg-blue-600 text-white py-3 rounded-xl hover:bg-blue-700 text-sm font-medium transition-all shadow-sm hover:shadow-md">Crear cuenta</button>
          <p class="text-center text-sm text-gray-500">
            ¿Ya tenés cuenta?
            <a href="#" onclick="showLogin()" class="text-blue-600 hover:text-blue-700 font-medium">Ingresá</a>
          </p>
          <p id="reg-error" class="text-red-500 text-sm text-center hidden"></p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modals -->
<div id="clientModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden items-center justify-center z-50">
  <div class="bg-white rounded-2xl shadow-2xl p-6 w-96 border border-gray-100">
    <h3 class="text-lg font-semibold mb-4" id="clientModalTitle">Nuevo Bot</h3>
    <div class="space-y-3">
      <input id="clientModal-name" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="Nombre del negocio">
      <input id="clientModal-phone" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="WhatsApp (ej: 5491112345678)">
      <input id="clientModal-business" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="Nombre comercial (opcional)">
    </div>
    <div class="flex justify-end gap-3 mt-6">
      <button onclick="closeClientModal()" class="px-4 py-2 border border-gray-200 rounded-xl hover:bg-gray-50 text-sm font-medium transition-all">Cancelar</button>
      <button onclick="saveClient()" class="px-4 py-2 bg-blue-600 text-white rounded-xl hover:bg-blue-700 text-sm font-medium transition-all shadow-sm">Guardar</button>
    </div>
  </div>
</div>

<div id="productModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden items-center justify-center z-50">
  <div class="bg-white rounded-2xl shadow-2xl p-6 w-96 border border-gray-100">
    <h3 class="text-lg font-semibold mb-4" id="productModalTitle">Nuevo Producto</h3>
    <div class="space-y-3">
      <input id="productModal-name" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="Nombre">
      <input id="productModal-price" type="number" step="0.01" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="Precio (opcional)">
      <input id="productModal-emoji" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="Emoji (ej: 🍕)">
      <textarea id="productModal-desc" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="Descripción (opcional)" rows="2"></textarea>
    </div>
    <div class="flex justify-end gap-3 mt-6">
      <button onclick="closeProductModal()" class="px-4 py-2 border border-gray-200 rounded-xl hover:bg-gray-50 text-sm font-medium transition-all">Cancelar</button>
      <button onclick="saveProduct()" class="px-4 py-2 bg-blue-600 text-white rounded-xl hover:bg-blue-700 text-sm font-medium transition-all shadow-sm" id="productModalBtn">Guardar</button>
    </div>
  </div>
</div>

<div id="keywordModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden items-center justify-center z-50">
  <div class="bg-white rounded-2xl shadow-2xl p-6 w-96 border border-gray-100">
    <h3 class="text-lg font-semibold mb-4" id="keywordModalTitle">Nueva palabra clave</h3>
    <div class="space-y-3">
      <input id="keywordModal-keyword" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="Palabra clave (ej: precio)">
      <textarea id="keywordModal-response" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" rows="4" placeholder="Respuesta automática..."></textarea>
      <label class="flex items-center gap-2 text-sm text-gray-600">
        <input id="keywordModal-active" type="checkbox" checked class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
        Activa
      </label>
    </div>
    <div class="flex justify-end gap-3 mt-6">
      <button onclick="closeKeywordModal()" class="px-4 py-2 border border-gray-200 rounded-xl hover:bg-gray-50 text-sm font-medium transition-all">Cancelar</button>
      <button onclick="saveKeyword()" class="px-4 py-2 bg-blue-600 text-white rounded-xl hover:bg-blue-700 text-sm font-medium transition-all shadow-sm">Guardar</button>
    </div>
  </div>
</div>

<!-- Loading overlay -->
<div id="loadingOverlay" class="fixed inset-0 bg-black/30 backdrop-blur-sm hidden items-center justify-center z-50">
  <div class="bg-white rounded-2xl shadow-2xl p-6 flex items-center gap-4">
    <svg class="animate-spin h-6 w-6 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
    <span id="loadingText" class="text-gray-700 font-medium">Cargando...</span>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
